<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 — ไม่พบหน้าที่ต้องการ</title>
  <link rel="stylesheet" href="/static/css/style.css?v=1.2.1">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #1059A3 0%, #1D9E75 100%);
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.5);
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      overflow: hidden;
      font-family: var(--font-sans);
    }

    /* Animated Background Blobs */
    .bg-blobs {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      background: linear-gradient(180deg, #f0f4f8 0%, #d9e2ec 100%);
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      filter: blur(80px);
      border-radius: 50%;
      opacity: 0.15;
      animation: move 20s infinite alternate;
    }

    .blob-1 { top: -100px; left: -100px; background: #1059A3; }
    .blob-2 { bottom: -100px; right: -100px; background: #1D9E75; animation-delay: -5s; }

    @keyframes move {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(50px, 100px) scale(1.1); }
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2.5rem 2rem;
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      z-index: 10;
      text-align: center;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Icon */
    .icon-wrap {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #fef5e7 0%, #fde8c8 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 16px rgba(200, 120, 30, 0.15);
    }

    /* 404 number */
    .num-404 {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -2px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #102a43;
      margin-bottom: 0.5rem;
    }

    .desc {
      font-size: 14px;
      color: #627d98;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 3px;
      background: var(--primary-gradient);
      border-radius: 2px;
      margin: 0 auto 1.5rem;
      opacity: 0.5;
    }

    /* Path display */
    .path-box {
      background: rgba(16, 89, 163, 0.06);
      border: 1px solid rgba(16, 89, 163, 0.12);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      color: #486581;
      margin-bottom: 1.75rem;
      word-break: break-all;
    }

    .path-label {
      font-size: 11px;
      color: #9fb3c8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    /* Back button */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: var(--primary-gradient);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(16, 89, 163, 0.2);
      justify-content: center;
      box-sizing: border-box;
    }

    .btn-back:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 89, 163, 0.3);
    }

    .btn-back:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Warning icon -->
    <div class="icon-wrap">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="#D97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="12" y1="17" x2="12.01" y2="17" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- 404 -->
    <div class="num-404">404</div>
    <div class="title">ไม่พบหน้าที่ต้องการ</div>

    <div class="divider"></div>

    <p class="desc">ขออภัย ไม่พบหน้าเพจที่คุณกำลังมองหา<br>อาจถูกย้าย ลบ หรือพิมพ์ URL ผิดพลาด</p>

    <!-- Show current path -->
    <div class="path-box">
      <div class="path-label">URL ที่ร้องขอ</div>
      <div id="req-path">—</div>
    </div>

    <!-- Back button -->
    <a href="/employee" class="btn-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      กลับหน้าหลัก
    </a>

  </div>

  <script>
    //? แสดง URL ที่ผู้ใช้พยายามเข้า เพื่อให้รู้ว่า path ไหนที่ไม่พบ
    document.getElementById('req-path').textContent = window.location.pathname;
  </script>

</body>
</html>
