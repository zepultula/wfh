<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WFH Daily Report — มทร.ล้านนา ตาก</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=1.2.1">
    <style>
      body { align-items: center; justify-content: center; }
      .land-wrap { width: 100%; max-width: 380px; padding: 2rem 1rem; }
      .land-logo { width: 56px; height: 56px; background: #E6F1FB; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 26px; }
      .land-title { font-size: 20px; font-weight: 600; text-align: center; }
      .land-sub { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 4px; margin-bottom: 2rem; }
      .land-btn { display: block; padding: 18px 20px; border-radius: var(--border-radius-lg); text-decoration: none; text-align: center; margin-bottom: 12px; transition: all 0.2s; }
      .land-btn:hover { transform: translateY(-2px); }
      .land-btn-title { font-size: 15px; font-weight: 600; }
      .land-btn-sub { font-size: 11px; margin-top: 3px; opacity: 0.8; }
      .land-btn-emp { background: linear-gradient(135deg, #1059A3 0%, #0C447C 100%); color: white; box-shadow: 0 4px 12px rgba(12,68,124,0.2); }
      .land-btn-sup { background: var(--color-background-primary); color: var(--color-text-primary); border: 1px solid var(--color-border-secondary); box-shadow: var(--shadow-sm); }
      .land-btn-sup .land-btn-sub { color: var(--color-text-secondary); opacity: 1; }
    </style>
</head>
<body>

<div class="land-wrap">
  <div class="land-logo">🔒</div>
  <div class="land-title">WFH Daily Report</div>
  <div class="land-sub">ระบบรายงานการทำงานประจำวัน · มทร.ล้านนา ตาก</div>

  <form id="loginForm" style="margin-bottom: 1.5rem;">
    <div style="margin-bottom: 1rem;">
      <label style="display: block; font-size: 13px; margin-bottom: 4px; color: var(--color-text-secondary);">อีเมล (Email)</label>
      <input type="email" id="email" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--color-border-secondary); font-size: 15px;">
    </div>
    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 13px; margin-bottom: 4px; color: var(--color-text-secondary);">รหัสผ่าน (Password)</label>
      <input type="password" id="password" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--color-border-secondary); font-size: 15px;">
    </div>
    <button type="submit" class="land-btn land-btn-emp" style="width: 100%; border: none; cursor: pointer;">
      <div class="land-btn-title">เข้าสู่ระบบ</div>
    </button>
    <div id="loginError" style="color: #e74c3c; font-size: 13px; text-align: center; margin-top: 10px; display: none;"></div>
  </form>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('loginError');
    const submitBtn = e.target.querySelector('button[type="submit"]');

    errorDiv.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        throw new Error(data.detail || 'การเข้าสู่ระบบล้มเหลว');
      }

      // Save token and info
      localStorage.setItem('auth_token', data.token);
      localStorage.setItem('user_role', data.user.role);
      localStorage.setItem('user_level', data.user.level);

      // Redirect based on role/level
      const roleStr = (data.user.role || '').toLowerCase();
      const isAdmin = data.user.level > 0 || roleStr.includes('admin') || roleStr.includes('ผู้ดูแลระบบ');
      
      if (!isAdmin) {
        window.location.href = '/static/employee.html';
      } else {
        window.location.href = '/static/admin.html';
      }
      
    } catch (err) {
      Swal.fire({
        icon: 'error',
        title: 'เข้าสู่ระบบไม่สำเร็จ',
        text: err.message,
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#1059A3'
      });
    } finally {
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  });
</script>
</body>
</html>
